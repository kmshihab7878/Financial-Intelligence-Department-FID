# Exchange configuration
# Each exchange requires an MCP server to be available.
# Only 'aster' is enabled by default.

exchanges:
  - exchange_id: aster
    enabled: true
    is_default: true
    # mcp_server_url: set via AIS_MCP_SERVER_URL env var
    rate_limit_rps: 5.0
    timeout_seconds: 10.0
    # account_id: set via ASTER_ACCOUNT_ID env var

  # Future exchanges (disabled by default):
