name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - name: Ruff lint
        run: ruff check src/ tests/unit/
      - name: Ruff format check
        run: ruff format --check src/ tests/unit/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]" types-PyYAML
      - name: mypy
        run: mypy src/aiswarm/ --ignore-missing-imports

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/unit/ --cov=src/aiswarm --cov-report=term-missing --cov-fail-under=83
        env:
          AIS_RISK_HMAC_SECRET: test-secret-for-ci
          AIS_API_KEY: test-api-key-for-ci

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pip-audit bandit
      - name: pip-audit
        run: pip-audit --strict --ignore-vuln PYSEC-2024-* --ignore-vuln CVE-2026-4539
      - name: bandit
        run: bandit -r src/aiswarm/ -c pyproject.toml || bandit -r src/aiswarm/ -ll
      - name: Check for secrets
        run: |
          PATTERNS="AIS_API_KEY=.\{10,\}\|AIS_RISK_HMAC_SECRET=.\{10,\}\|BINANCE_API_KEY=.\{10,\}\|COINBASE_API_KEY=.\{10,\}\|BYBIT_API_KEY=.\{10,\}\|AKIA[0-9A-Z]\{16\}"
          if grep -r "$PATTERNS" .env src/ config/ 2>/dev/null | grep -v "test-secret\|\.example\|\.py:.*#"; then
            echo "ERROR: Potential real secret found in tracked files"
            exit 1
          fi

  docs:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install mkdocs-material mkdocs-autorefs
      - name: Build docs
        run: mkdocs build --strict

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ais:test .

  ci-pass:
    name: CI Pass
    if: always()
    needs: [lint, typecheck, test, security, docs, docker]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]] || \
             [[ "${{ needs.docs.result }}" != "success" ]] || \
             [[ "${{ needs.docker.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All CI checks passed"
